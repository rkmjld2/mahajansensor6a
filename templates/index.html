<!DOCTYPE html>
<html>
<head>
    <title>ESP8266 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; text-align: center; }
        button { padding: 10px; margin: 5px; }
    </style>
</head>

<body>

<h2>ESP8266 Sensor Dashboard</h2>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>
<button onclick="resetView()">Reset Auto View</button>
<button onclick="loadAll()">Load All Data</button>

<h3 id="status">Status: Checking...</h3>

<h3>Search by Date</h3>
<input type="datetime-local" id="start">
<input type="datetime-local" id="end">
<button onclick="search()">Search</button>

<h3>Graph</h3>
<canvas id="myChart"></canvas>

<script>

let autoRefresh = true;
let currentData = [];

function formatTime(t){
    if(!t) return "";
    return t;   // ✅ NO conversion (fix timezone issue)
}

async function loadData(){
    if(!autoRefresh) return;

    let res = await fetch('/api/latest');
    let data = await res.json();

    currentData = data;
    showData(data);
}

function showData(data){
    if(data.length === 0) return;

    let labels = data.map(d => formatTime(d.timestamp));
    let s1 = data.map(d => d.sensor1);
    let s2 = data.map(d => d.sensor2);
    let s3 = data.map(d => d.sensor3);

    let ctx = document.getElementById("myChart").getContext("2d");

    if(window.chart) window.chart.destroy();

    window.chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: "Sensor 1", data: s1 },
                { label: "Sensor 2", data: s2 },
                { label: "Sensor 3", data: s3 }
            ]
        }
    });
}

async function loadAll(){
    autoRefresh = false;

    let res = await fetch('/data_all');
    let data = await res.json();

    currentData = data;
    showData(data);
}

function start(){ autoRefresh = true; }
function stop(){ autoRefresh = false; }
function resetView(){ autoRefresh = true; }

async function search(){
    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;

    autoRefresh = false;

    let res = await fetch('/search', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({start, end})
    });

    let data = await res.json();
    currentData = data;
    showData(data);
}

async function status(){
    let res = await fetch('/status');
    let data = await res.json();

    document.getElementById("status").innerText =
        data.connected ? "Status: Connected" : "Status: Disconnected";
}

setInterval(loadData, 5000);
setInterval(status, 3000);

</script>

</body>
</html>
