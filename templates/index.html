<!DOCTYPE html>
<html>
<head>
    <title>ESP8266 Sensor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; text-align: center; }
        button { padding: 8px; margin: 5px; }
        input { padding: 5px; margin: 5px; }
        canvas { max-width: 90%; }
    </style>
</head>

<body>

<h2>ESP8266 Sensor Dashboard</h2>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>
<button onclick="resetView()">Reset Auto View</button>
<button onclick="loadAll()">Load All Data</button>
<button onclick="downloadCSV()">Download CSV</button>

<h3 id="status">Status: Checking...</h3>

<h3>Search by Date</h3>
<input type="datetime-local" id="start">
<input type="datetime-local" id="end">
<button onclick="search()">Search</button>

<h3>Graph</h3>
<select id="chartType" onchange="drawChart()">
    <option value="line">Line</option>
    <option value="bar">Bar</option>
</select>

<canvas id="myChart"></canvas>

<script>

let autoRefresh = true;
let currentData = [];

// ✅ NO TIME CONVERSION (FIXED)
function formatTime(t){
    return t;
}

// -------- LOAD LIVE DATA --------
async function loadData(){
    if(!autoRefresh) return;

    let res = await fetch('/data');   // ✅ FIXED
    let data = await res.json();

    currentData = data;
    drawChart();
}

// -------- DRAW GRAPH --------
function drawChart(){
    if(currentData.length === 0) return;

    let labels = currentData.map(d => formatTime(d.timestamp));
    let s1 = currentData.map(d => d.sensor1);
    let s2 = currentData.map(d => d.sensor2);
    let s3 = currentData.map(d => d.sensor3);

    let ctx = document.getElementById("myChart").getContext("2d");

    if(window.chart) window.chart.destroy();

    let type = document.getElementById("chartType").value;

    window.chart = new Chart(ctx, {
        type: type,
        data: {
            labels: labels,
            datasets: [
                { label: "Sensor 1", data: s1, borderWidth: 2 },
                { label: "Sensor 2", data: s2, borderWidth: 2 },
                { label: "Sensor 3", data: s3, borderWidth: 2 }
            ]
        }
    });
}

// -------- LOAD ALL FROM SD --------
async function loadAll(){
    autoRefresh = false;

    let res = await fetch('/data_all');
    let data = await res.json();

    currentData = data;
    drawChart();
}

// -------- DOWNLOAD CSV --------
function downloadCSV(){
    if(currentData.length === 0){
        alert("No data");
        return;
    }

    let csv = "ID,Sensor1,Sensor2,Sensor3,Timestamp\n";

    currentData.forEach(r => {
        csv += `${r.id},${r.sensor1},${r.sensor2},${r.sensor3},${r.timestamp}\n`;
    });

    let blob = new Blob([csv], { type: "text/csv" });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "sensor_data.csv";
    a.click();
}

// -------- SEARCH --------
async function search(){
    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;

    autoRefresh = false;

    let res = await fetch('/search', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({start, end})
    });

    let data = await res.json();
    currentData = data;
    drawChart();
}

// -------- STATUS --------
async function status(){
    let res = await fetch('/status');
    let data = await res.json();

    document.getElementById("status").innerText =
        data.connected ? "Status: Connected" : "Status: Disconnected";
}

// -------- CONTROLS --------
function start(){ autoRefresh = true; }
function stop(){ autoRefresh = false; }
function resetView(){ autoRefresh = true; }

// -------- AUTO REFRESH --------
setInterval(loadData, 5000);
setInterval(status, 3000);

window.onload = function(){
    loadData();
    status();
};

</script>

</body>
</html>
